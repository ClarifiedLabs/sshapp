name: deploy-ios

on:
  push:
    branches:
      - release-ci
    tags:
      - v*.*.*
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: Upload to TestFlight
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  require-tests:
    name: Require iOS tests
    runs-on: ubuntu-24.04
    timeout-minutes: 125
    permissions:
      actions: write
      contents: read

    env:
      TEST_WORKFLOW_FILE: test-ios.yml
      TEST_TIMEOUT_SECONDS: 7200
      TEST_DISPATCH_GRACE_SECONDS: 120
      TEST_POLL_SECONDS: 30

    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve test target
        id: test-target
        run: |
          set -euo pipefail

          test_sha="$(git rev-parse "$GITHUB_SHA^{commit}")"
          test_ref="$GITHUB_REF_NAME"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            git fetch origin main
            git merge-base --is-ancestor "$test_sha" origin/main
          fi

          echo "sha=$test_sha" >> "$GITHUB_OUTPUT"
          echo "ref=$test_ref" >> "$GITHUB_OUTPUT"

      - name: Wait for or start test workflow
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TEST_REF: ${{ steps.test-target.outputs.ref }}
          TEST_SHA: ${{ steps.test-target.outputs.sha }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com")
          repo = os.environ["REPO"]
          workflow_file = os.environ["TEST_WORKFLOW_FILE"]
          test_ref = os.environ["TEST_REF"]
          test_sha = os.environ["TEST_SHA"]
          token = os.environ["GH_TOKEN"]
          timeout_seconds = int(os.environ["TEST_TIMEOUT_SECONDS"])
          dispatch_grace_seconds = int(os.environ["TEST_DISPATCH_GRACE_SECONDS"])
          poll_seconds = int(os.environ["TEST_POLL_SECONDS"])

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }


          def github_request(method: str, url: str, payload: dict[str, str] | None = None) -> bytes:
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              request = urllib.request.Request(url, data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(request) as response:
                      return response.read()
              except urllib.error.HTTPError as error:
                  details = error.read().decode("utf-8", errors="replace")
                  print(details, file=sys.stderr)
                  raise


          def workflow_runs() -> list[dict[str, object]]:
              params = urllib.parse.urlencode({"head_sha": test_sha, "per_page": "50"})
              url = f"{api_url}/repos/{repo}/actions/workflows/{workflow_file}/runs?{params}"
              data = json.loads(github_request("GET", url).decode("utf-8"))
              return [
                  run
                  for run in data.get("workflow_runs", [])
                  if run.get("head_sha") == test_sha
              ]


          def dispatch_workflow() -> None:
              quoted_workflow = urllib.parse.quote(workflow_file, safe="")
              url = f"{api_url}/repos/{repo}/actions/workflows/{quoted_workflow}/dispatches"
              github_request("POST", url, {"ref": test_ref})


          def describe(run: dict[str, object]) -> str:
              return (
                  f"{run.get('id')}: status={run.get('status')}, "
                  f"conclusion={run.get('conclusion') or 'pending'}, "
                  f"url={run.get('html_url')}"
              )


          start = time.monotonic()
          deadline = start + timeout_seconds
          dispatch_after = start + dispatch_grace_seconds
          dispatched = False

          print(f"Waiting for {workflow_file} at {test_sha}.")
          while time.monotonic() < deadline:
              runs = workflow_runs()
              successful_runs = [
                  run
                  for run in runs
                  if run.get("status") == "completed" and run.get("conclusion") == "success"
              ]
              active_runs = [
                  run
                  for run in runs
                  if run.get("status") != "completed"
              ]
              failed_runs = [
                  run
                  for run in runs
                  if run.get("status") == "completed" and run.get("conclusion") != "success"
              ]

              if successful_runs:
                  print(f"Required test workflow passed: {describe(successful_runs[0])}")
                  raise SystemExit(0)

              if active_runs:
                  print(f"Waiting for test workflow run {describe(active_runs[0])}")
                  time.sleep(poll_seconds)
                  continue

              if failed_runs:
                  print(f"Required test workflow did not pass: {describe(failed_runs[0])}", file=sys.stderr)
                  raise SystemExit(1)

              if not dispatched and time.monotonic() >= dispatch_after:
                  print(f"No existing test workflow run found for {test_sha}; dispatching {workflow_file} on {test_ref}.")
                  dispatch_workflow()
                  dispatched = True
              else:
                  print("No matching test workflow run found yet.")

              time.sleep(poll_seconds)

          print(f"Timed out waiting for {workflow_file} on {test_sha}.", file=sys.stderr)
          raise SystemExit(1)
          PY

  build:
    name: Build and deploy iOS
    needs: require-tests
    runs-on: macos-26
    permissions:
      contents: read

    env:
      SCHEME: SSHApp
      PROJECT: SSHApp.xcodeproj
      BUNDLE_IDENTIFIER: dev.sshapp.sshapp
      BUILD_DIR: .build/release
      ARCHIVE_PATH: .build/release/SSHApp.xcarchive
      IPA_PATH: .build/release/SSHApp.ipa
      XCODE_SOURCE_PACKAGES_PATH: .build/ci/xcode-source-packages
      XCODE_DERIVED_DATA_PATH: .build/ci/xcode-derived-data

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify release commit is on main
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          git fetch origin main
          release_sha="$(git rev-parse "$GITHUB_SHA^{commit}")"
          git merge-base --is-ancestor "$release_sha" origin/main

      - name: Restore file mtimes
        run: |
          set -euo pipefail
          command -v git-restore-mtime >/dev/null || brew install git-tools
          git restore-mtime

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            latest_tag="$(git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 2>/dev/null || true)"
            if [[ -n "$latest_tag" ]]; then
              version="${latest_tag#v}"
            else
              version="$(awk -F ' = |;' '/MARKETING_VERSION = [0-9]+[.][0-9]+[.][0-9]+;/ { print $2; exit }' "$PROJECT/project.pbxproj")"
            fi
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid iOS release version: $version" >&2
            exit 2
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set build versions
        run: |
          set -euo pipefail
          echo "MARKETING_VERSION=${{ steps.version.outputs.version }}" >> "$GITHUB_ENV"
          echo "CURRENT_PROJECT_VERSION=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"

      - name: Require Xcode 26
        run: |
          set -euo pipefail
          version="$(xcodebuild -version | awk '/^Xcode / { print $2 }')"
          echo "Xcode ${version}"
          case "$version" in
            26|26.*) ;;
            *)
              echo "Xcode 26 is required; found ${version:-unknown}" >&2
              exit 1
              ;;
          esac

      - name: Install Zig 0.15
        run: |
          set -euo pipefail
          brew install zig@0.15
          zig_path="$(brew --prefix zig@0.15)/bin/zig"
          zig_version="$("$zig_path" version)"
          if [[ "$zig_version" != "0.15.2" ]]; then
            echo "Zig 0.15.2 is required; found $zig_version at $zig_path" >&2
            exit 1
          fi
          echo "ZIG=$zig_path" >> "$GITHUB_ENV"

      - name: Resolve native cache inputs
        id: native-cache
        run: |
          set -euo pipefail
          echo "libssh2_commit=$(git -C vendor/libssh2 rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "openssl_commit=$(git -C vendor/openssl rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "ghostty_commit=$(git -C vendor/ghostty rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache native frameworks
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: Frameworks
          key: native-frameworks-${{ runner.os }}-${{ steps.native-cache.outputs.libssh2_commit }}-${{ steps.native-cache.outputs.openssl_commit }}-${{ steps.native-cache.outputs.ghostty_commit }}-${{ hashFiles('scripts/build-libssh2.sh', 'scripts/build-ghostty-ios.sh', 'scripts/ghostty-patches/**', 'scripts/support/**', 'Packages/SSHAppGhostty/Package.swift') }}

      - name: Build native frameworks
        run: |
          set -euo pipefail
          make setup

      - name: Cache Xcode SwiftPM packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.XCODE_SOURCE_PACKAGES_PATH }}
          key: xcode-spm-${{ runner.os }}-${{ hashFiles('SSHApp.xcodeproj/project.pbxproj', 'Packages/SSHAppGhostty/Package.swift') }}
          restore-keys: |
            xcode-spm-${{ runner.os }}-

      - name: Cache Xcode DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.XCODE_DERIVED_DATA_PATH }}
          key: xcode-deriveddata-release-${{ runner.os }}-${{ hashFiles('SSHApp.xcodeproj/project.pbxproj', 'SSHApp.xcodeproj/xcshareddata/xcschemes/*.xcscheme', 'SSHApp/**/*.swift', 'SSHApp/**/*.h', 'SSHApp/**/*.entitlements', 'Packages/SSHAppGhostty/Package.swift', 'Packages/SSHAppGhostty/Sources/**/*.swift', 'scripts/build-libssh2.sh', 'scripts/build-ghostty-ios.sh') }}

      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          api_key_path="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          mkdir -p "$(dirname "$api_key_path")"
          printf '%s\n' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APP_STORE_CONNECT_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"

      - name: Import distribution certificate
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          decode_base64() {
            if base64 --decode </dev/null >/dev/null 2>&1; then
              base64 --decode
            else
              base64 -D
            fi
          }

          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"
          existing_keychains=()

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"

          printf '%s' "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | decode_base64 > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"

          while IFS= read -r keychain; do
            [[ -n "$keychain" ]] && existing_keychains+=("$keychain")
          done < <(security list-keychains -d user | tr -d '"' | sed 's/^[[:space:]]*//')
          security list-keychains -d user -s "$keychain_path" "${existing_keychains[@]}"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

          rm -f "$RUNNER_TEMP/cert.p12"
          echo "KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          decode_base64() {
            if base64 --decode </dev/null >/dev/null 2>&1; then
              base64 --decode
            else
              base64 -D
            fi
          }

          profile_path="$HOME/Library/MobileDevice/Provisioning Profiles/SSHApp.mobileprovision"
          profile_plist_path="$RUNNER_TEMP/SSHApp.mobileprovision.plist"
          mkdir -p "$(dirname "$profile_path")"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | decode_base64 > "$profile_path"
          chmod 600 "$profile_path"

          security cms -D -i "$profile_path" > "$profile_plist_path"
          profile_uuid="$(/usr/libexec/PlistBuddy -c "Print UUID" "$profile_plist_path")"
          profile_name="$(/usr/libexec/PlistBuddy -c "Print Name" "$profile_plist_path")"
          rm -f "$profile_plist_path"
          echo "PROVISIONING_PROFILE_UUID=$profile_uuid" >> "$GITHUB_ENV"
          echo "PROVISIONING_PROFILE_NAME=$profile_name" >> "$GITHUB_ENV"

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          mkdir -p "$XCODE_SOURCE_PACKAGES_PATH" "$XCODE_DERIVED_DATA_PATH"
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$PWD/$XCODE_SOURCE_PACKAGES_PATH" \
            -derivedDataPath "$PWD/$XCODE_DERIVED_DATA_PATH" \
            -skipPackagePluginValidation

      - name: Build archive
        run: |
          set -euo pipefail
          mkdir -p "$BUILD_DIR"
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -clonedSourcePackagesDirPath "$PWD/$XCODE_SOURCE_PACKAGES_PATH" \
            -derivedDataPath "$PWD/$XCODE_DERIVED_DATA_PATH" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$CURRENT_PROJECT_VERSION" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SUPPRESS_WARNINGS=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation

      - name: Embed release entitlements in archived binary
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          entitlements_path="$BUILD_DIR/SSHAppRelease.entitlements"
          cat > "$entitlements_path" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.ubiquity-kvstore-identifier</key>
              <string>${APPLE_TEAM_ID}.${BUNDLE_IDENTIFIER}</string>
          </dict>
          </plist>
          EOF
          codesign --force --sign - \
            --entitlements "$entitlements_path" \
            "$ARCHIVE_PATH/Products/Applications/SSHApp.app"

      - name: Create ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          cat > "$BUILD_DIR/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>destination</key>
              <string>export</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>uploadSymbols</key>
              <true/>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${BUNDLE_IDENTIFIER}</key>
                  <string>${PROVISIONING_PROFILE_NAME}</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$BUILD_DIR" \
            -exportOptionsPlist "$BUILD_DIR/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APP_STORE_CONNECT_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload to TestFlight
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.upload_to_testflight)
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload dSYMs to App Store Connect
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.upload_to_testflight)
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [[ ! -d "$ARCHIVE_PATH/dSYMs" ]] || ! find "$ARCHIVE_PATH/dSYMs" -name '*.dSYM' -print -quit | grep -q .; then
            echo "No dSYMs found in $ARCHIVE_PATH/dSYMs"
            exit 0
          fi
          (cd "$ARCHIVE_PATH/dSYMs" && zip -r "$GITHUB_WORKSPACE/$BUILD_DIR/SSHApp.dSYMs.zip" .)
          xcrun symbols upload \
            --type ios \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            "$BUILD_DIR/SSHApp.dSYMs.zip"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SSHApp.ipa
          path: ${{ env.IPA_PATH }}
          if-no-files-found: error

      - name: Upload dSYM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SSHApp.dSYM
          path: ${{ env.ARCHIVE_PATH }}/dSYMs/
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          set -euo pipefail
          if [[ -n "${KEYCHAIN_PATH:-}" && -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/SSHApp.mobileprovision"
          rm -rf "$HOME/.appstoreconnect"
